<p-card>
  <ng-template #title>
    <div class="flex justify-between items-center">
      <h3 id="table-title" class="text-lg font-semibold text-[#0d141c]">
        Assignment History
      </h3>
      <p-button
        label="Export to PDF"
        icon="pi pi-file-pdf"
        text
        size="small"
        aria-label="Export history to PDF"
        disabled
      />
    </div>
  </ng-template>

  <p-table
    #dt
    [value]="history()"
    [lazy]="true"
    (onLazyLoad)="onSearch($event)"
    [paginator]="true"
    [rows]="10"
    [totalRecords]="pagination()?.total || 0"
    [loading]="isLoading()"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} residents"
    [rowsPerPageOptions]="[10, 20, 50]"
    paginatorStyleClass="mt-10"
  >
    <ng-template #header>
      <tr>
        <th scope="col">Date</th>
        <th scope="col" class="w-40 text-center">Assigned Spot</th>
        <th scope="col">Outcome</th>
      </tr>
    </ng-template>

    <ng-template #body let-item>
      <tr>
        <td class="text-sm">{{ item.assignedDate | date: 'short' }}</td>
        <td class="text-sm">
          <app-slot-assignation-tag [slot]="item.slotNumber" />
        </td>
        <td class="text-sm">
          <app-raffle-user-result-tag [status]="item.status" />
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="3" class="text-center py-8 text-gray-400">
          No assignment history available.
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
