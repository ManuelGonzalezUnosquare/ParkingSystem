<header class="flex items-center justify-between">
  <app-page-header
    title="Raffle History"
    subTitle="Review past parking lot allocations and download detailed performance reports."
  />
</header>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
  <p-card class="bg-blue-50">
    <ng-template #title>
      <div class="flex gap-4 items-start">
        <i
          class="pi pi-chart-bar text-4xl text-blue-500 bg-blue-100 p-3 rounded-md"
          aria-hidden="true"
        ></i>
        <div class="block">
          <p
            class="text-[#4b739b] text-sm font-medium uppercase tracking-wider"
          >
            Total Raffles
          </p>

          <p
            class="text-[#0d141c] tracking-tight text-4xl font-extrabold leading-tight"
          >
            {{ store.rafflesPagination()?.total || 0 }}
          </p>
        </div>
      </div>
    </ng-template>
  </p-card>
  <app-last-raffle-card [raffle]="store.next()" />
  <p-card header="title" />
</div>

<p-card>
  <app-building-raffle-history-table
    [raffles]="store.rafflesHistory()"
    [isLoading]="store.isLoading()"
    [pagination]="store.rafflesPagination()"
    (filter)="store.loadHistory($event)"
  />
</p-card>
