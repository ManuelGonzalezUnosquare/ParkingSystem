<app-page-header
  [title]="`${building()?.name} Allocation Results`"
  [subTitle]="`Executed on ${raffle()?.executionDate |date}`"
/>
<p-card>
  <p-table
    #dt
    [value]="store.resultsView()?.data || []"
    [lazy]="true"
    [paginator]="true"
    [rows]="10"
    [totalRecords]="store.resultsView()?.pagination?.total || 0"
    (onLazyLoad)="search($event)"
    [lazyLoadOnInit]="false"
    [loading]="store.isLoading()"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} residents"
    [rowsPerPageOptions]="[10, 20, 50]"
    paginatorStyleClass="mt-10"
  >
    <ng-template pTemplate="caption">
      <div class="flex flex-col sm:flex-row justify-end items-center gap-4">
        <div class="flex items-center gap-3 w-full sm:w-auto">
          <p-select
            [options]="userRaffleResultOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Select user status"
            class="w-full md:w-56"
            [showClear]="true"
            (onChange)="searchByStatus($event)"
          />

          <span class="p-input-icon-left w-full sm:w-80">
            <input
              pInputText
              class="w-full"
              placeholder="Search by user, vehicle, license,slot..."
              (input)="dt.filterGlobal($any($event.target).value, 'contains')"
            />
          </span>
        </div>
      </div>
    </ng-template>

    <ng-template #header>
      <tr>
        <th>User</th>
        <th>Vehicle</th>
        <th class="text-center">License Plate</th>
        <th class="text-center">Score at draw</th>
        <th class="text-center">Status</th>
        <th>Slot</th>
      </tr>
    </ng-template>
    <ng-template #body let-result>
      <tr>
        <td class="capitalize">{{result.userName}}</td>
        <td>{{result.vehicleDescription || '--'}}</td>
        <td class="text-center">{{result.vehiclePlate || '--'}}</td>
        <td class="text-center">{{result.userScoreAtDraw}}</td>
        <td class="text-center">
          <app-raffle-user-result-tag [status]="result.status" />
        </td>
        <td>
          <app-slot-assignation-tag [slot]="result.slotNumber" />
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
